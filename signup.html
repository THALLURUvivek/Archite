<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your STACKLY account to start your architecture and interior design journey. Join our platform to access exclusive services and manage your design projects.">

    <title>STACKLY | Sign Up</title>

    <!-- Design System & Styles -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/auth.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Password Strength Indicator Styles -->
    <style>
        .password-strength {
            margin-bottom: 15px;
        }

        .strength-bar {
            width: 100%;
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 4px;
        }

        .strength-bar-fill.weak {
            width: 33%;
            background-color: #ef4444;
        }

        .strength-bar-fill.medium {
            width: 66%;
            background-color: #f59e0b;
        }

        .strength-bar-fill.good {
            width: 85%;
            background-color: #3b82f6;
        }

        .strength-bar-fill.strong {
            width: 100%;
            background-color: #10b981;
        }

        .strength-text {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .strength-text.weak {
            color: #ef4444;
        }

        .strength-text.medium {
            color: #f59e0b;
        }

        .strength-text.good {
            color: #3b82f6;
        }

        .strength-text.strong {
            color: #10b981;
        }

        .password-requirements {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
        }

        .requirement {
            font-size: 0.8rem;
            margin: 6px 0;
            color: #64748b;
            transition: color 0.3s ease;
        }

        .requirement.met {
            color: #10b981;
            font-weight: 600;
        }

        .requirement.met::before {
            content: '✓ ';
        }

        .requirement:not(.met)::before {
            content: '✗ ';
        }
    </style>

</head>

<body>

    <div class="auth-container">

        <!-- LEFT PANEL -->

        <div class="left-panel">

            <div class="left-content">

                <h1>STACKLY</h1>

                <p>
                    Architecture & Interior Design Studio
                </p>

            </div>

        </div>

        <!-- RIGHT PANEL -->
<div class="form-box">

    <!-- BACK TO HOME BUTTON -->
    <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back To Home</span>
    </a>

    <h2>Create Account</h2>
    <p class="subtitle">Join STACKLY today</p>

    <form id="signupForm">
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="name" placeholder="Full Name" required>
        </div>
        <small id="nameError" class="error-message"></small>

        <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <!-- Password Strength Indicator -->
        <div id="passwordStrength" class="password-strength" style="display: none; margin-top: 10px;">
            <div class="strength-bar">
                <div id="strengthBar" class="strength-bar-fill"></div>
            </div>
            <p id="strengthText" class="strength-text"></p>
            <div class="password-requirements">
                <p id="req-length" class="requirement">✗ At least 8 characters</p>
                <p id="req-uppercase" class="requirement">✗ One uppercase letter</p>
                <p id="req-lowercase" class="requirement">✗ One lowercase letter</p>
                <p id="req-number" class="requirement">✗ One number</p>
                <p id="req-special" class="requirement">✗ One special character (!@#$%^&*)</p>
            </div>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="login-btn">Create Account</button>
    </form>

    <p class="signup-text">
        Already have an account?
        <a href="login.html">Login</a>
    </p>
</div>


    </div>

    <!-- Built-in Crypto Utilities (No CDN required - works offline) -->
    <script src="js/crypto-utils.js"></script>
    <script src="js/signup-new.js"></script>

</body>

</html>
